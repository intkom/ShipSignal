name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Why do you need it?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Be as specific as you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you thought about?
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Small (single component or route)
        - Medium (multiple files, new feature)
        - Large (architectural change, new system)
    validations:
      required: true
