name: Bug Report
description: Report a bug or unexpected behavior
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - shipsignal.to (hosted)
        - Self-hosted
        - Local development
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / Device
      placeholder: 'Chrome 125, macOS 15 / iPhone 16, iOS 19'
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots or screen recordings.
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Browser console errors, server logs, etc.
      render: shell
