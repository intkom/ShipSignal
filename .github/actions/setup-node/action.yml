name: Setup Node.js
description: Set up Node.js with npm cache and install project dependencies.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: '20'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Install dependencies
      shell: bash
      run: npm ci
